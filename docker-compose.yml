services:
  iluma:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: iluma-app
    working_dir: /var/www
    ports:
      - '5173:5173'
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: iluma-nginx
    ports:
      - '8088:80'
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - iluma

  mysql:
    image: mysql:8.4
    container_name: iluma-mysql
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks
      MYSQL_USER: iluma
      MYSQL_PASSWORD: iluma123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -proot --silent']
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: iluma-mailpit
    ports:
      - '8026:8025'
      - '1026:1025'

volumes:
  mysql_data:
